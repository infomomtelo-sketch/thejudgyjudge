<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#3a2418"/>
      <stop offset="100%" stop-color="#1f120b"/>
    </radialGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a4a2c"/>
      <stop offset="55%" stop-color="#5c3420"/>
      <stop offset="100%" stop-color="#3f2114"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d77c"/>
      <stop offset="50%" stop-color="#c9a14a"/>
      <stop offset="100%" stop-color="#8a6a28"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#f4d77c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4d77c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="240" height="240" rx="28" fill="url(#bg)"/>
  <circle cx="120" cy="95" r="100" fill="url(#glow)"/>

  <!-- sound block -->
  <g transform="rotate(-18 120 175)">
    <rect x="84" y="166" width="72" height="20" rx="3" fill="url(#wood)" stroke="#241308" stroke-width="1.5"/>
    <rect x="84" y="166" width="72" height="5" rx="2" fill="#9c6a3e" opacity="0.6"/>
  </g>

  <!-- gavel head -->
  <g transform="rotate(-18 120 110)">
    <rect x="86" y="86" width="68" height="30" rx="5" fill="url(#wood)" stroke="#241308" stroke-width="1.5"/>
    <rect x="86" y="86" width="68" height="8" rx="3" fill="#a4724a" opacity="0.55"/>
    <!-- gold bands -->
    <rect x="92" y="86" width="6" height="30" fill="url(#gold)"/>
    <rect x="142" y="86" width="6" height="30" fill="url(#gold)"/>

    <!-- handle -->
    <rect x="113" y="116" width="14" height="78" rx="6" fill="url(#wood)" stroke="#241308" stroke-width="1.5"/>
    <rect x="113" y="116" width="14" height="10" fill="url(#gold)" opacity="0.85"/>
  </g>

  <!-- gold accent dot -->
  <circle cx="120" cy="120" r="2.5" fill="#f4d77c" opacity="0.9"/>
</svg>
